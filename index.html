<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ארכיון מסמכים | מערכת ניהול</title>
  
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --surface2: #F1F3F4;
      --surface3: #E8EAED;
      --border: #DADCE0;
      --border-light: #F1F3F4;
      --primary: #1A73E8;
      --primary-hover: #174EA6;
      --primary-light: #E8F0FE;
      --text: #202124;
      --text-muted: #5F6368;
      --text-dim: #80868B;
      --folder: #F4B400;
      --folder-bg: #FEF7E0;
      --danger: #D93025;
      --danger-bg: #FCE8E6;
      --radius: 8px;
      --radius-sm: 4px;
      --shadow-header: 0 1px 2px 0 rgba(60,64,67,0.3);
      --shadow-card: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
      --shadow-card-hover: 0 4px 12px 0 rgba(60,64,67,0.15), 0 8px 16px 4px rgba(60,64,67,0.1);
      --shadow-modal: 0 24px 38px 3px rgba(0,0,0,0.14), 0 9px 46px 8px rgba(0,0,0,0.12), 0 11px 15px -7px rgba(0,0,0,0.2);
    }

    body.dark-theme {
      --bg: #202124;
      --surface: #292A2D;
      --surface2: #3C4043;
      --surface3: #4A4D51;
      --border: #5F6368;
      --border-light: #3C4043;
      --primary: #8AB4F8;
      --primary-hover: #A8C7FA;
      --primary-light: rgba(138, 180, 248, 0.15);
      --text: #E8EAED;
      --text-muted: #9AA0A6;
      --text-dim: #80868B;
      --folder: #F8D62B;
      --folder-bg: rgba(248, 214, 43, 0.1);
      --danger: #F28B82;
      --danger-bg: rgba(242, 139, 130, 0.1);
      --shadow-header: 0 1px 2px 0 rgba(0,0,0,0.5);
      --shadow-card: 0 1px 2px 0 rgba(0,0,0,0.5);
      --shadow-card-hover: 0 8px 16px 0 rgba(0,0,0,0.4);
      --shadow-modal: 0 24px 38px 3px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Heebo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background-color 0.4s ease, color 0.4s ease; -webkit-font-smoothing: antialiased; }
    
    header { background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-header); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; height: 64px; transition: background-color 0.4s ease, border-color 0.4s ease; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; flex-shrink: 0; width: 240px; }
    .logo-icon { font-size: 1.4rem; color: var(--primary); }
    .logo-text { font-size: 1.2rem; font-weight: 500; color: var(--text); white-space: nowrap; }
    
    .search-wrap { flex: 1; max-width: 650px; position: relative; margin: 0 24px; }
    .search-inner { position: relative; display: flex; align-items: center; }
    #searchInput { width: 100%; padding: 10px 48px 10px 16px; background: var(--surface2); border: 1px solid transparent; border-radius: var(--radius); color: var(--text); font-size: 0.95rem; font-family: inherit; outline: none; transition: background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease; }
    #searchInput:focus { background: var(--surface); border-color: var(--primary); box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); }
    .search-icon-left { position: absolute; right: 16px; color: var(--text-muted); pointer-events: none; font-size: 1rem; }
    .search-clear { position: absolute; left: 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 4px; display: none; }
    .search-clear.visible { display: block; }
    
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .icon-btn { width: 40px; height: 40px; background: transparent; border: none; color: var(--text-muted); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: background 0.2s; }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    
    #breadcrumb { padding: 12px 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 0.9rem; background: var(--surface); border-bottom: 1px solid var(--border); transition: background-color 0.4s ease; }
    .crumb { cursor: pointer; color: var(--text-muted); padding: 4px 8px; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 6px; }
    .crumb:hover { background: var(--surface2); color: var(--text); }
    .crumb-sep { color: var(--border); font-size: 0.8rem; }
    .crumb-current { color: var(--text); font-weight: 500; padding: 4px 8px; display: flex; align-items: center; gap: 6px; }
    
    .app-body { display: flex; height: calc(100vh - 64px - 45px); position: relative; z-index: 1; }
    #sidebar { width: 260px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); padding: 16px 8px; overflow-y: auto; transition: background-color 0.4s ease; }
    .sidebar-title { font-size: 0.75rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; padding: 0 16px 12px; }
    .tree-item { display: flex; align-items: center; gap: 12px; padding: 8px 16px; margin-bottom: 4px; border-radius: 0 24px 24px 0; cursor: pointer; font-size: 0.9rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tree-item:hover { background: var(--surface2); color: var(--text); }
    .tree-item.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
    .tree-item .tree-icon { flex-shrink: 0; font-size: 1rem; color: var(--folder); }
    
    main { flex: 1; padding: 24px; overflow-y: auto; min-width: 0; background: var(--bg); transition: background-color 0.4s ease; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .sort-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 32px 6px 12px; border-radius: var(--radius-sm); font-size: 0.85rem; cursor: pointer; outline: none; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: left 8px center; background-size: 14px; }
    
    .search-banner { display: none; align-items: center; gap: 12px; background: var(--primary-light); border: 1px solid var(--primary); border-radius: var(--radius); padding: 12px 20px; margin-bottom: 24px; color: var(--text); }
    .search-banner.visible { display: flex; }
    
    .error-box { display: none; align-items: flex-start; gap: 12px; background: var(--danger-bg); border: 1px solid var(--danger); border-radius: var(--radius); padding: 16px 20px; color: var(--danger); font-size: 1rem; margin-bottom: 24px; line-height: 1.5; }
    .error-box.visible { display: flex; }

    /* עיצוב להודעת חסימת גישה בתוך הסייר */
    .access-denied-container { 
      grid-column: 1 / -1; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      text-align: center; 
      padding: 60px 20px;
      background: var(--surface);
      border: 1px dashed var(--danger);
      border-radius: var(--radius);
      animation: fadeInUp 0.5s ease;
    }
    .access-denied-icon { font-size: 4rem; color: var(--danger); margin-bottom: 20px; opacity: 0.8; }
    .access-denied-title { font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 12px; }
    .access-denied-text { font-size: 1.1rem; color: var(--text-muted); max-width: 500px; line-height: 1.6; margin-bottom: 24px; }
    
    /* ===== FILE GRID/LIST ===== */
    #fileContainer.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    #fileContainer.list { display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    
    .file-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; text-align: right; position: relative; animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    
    #fileContainer.grid .file-card { padding: 12px; gap: 10px; }
    #fileContainer.grid .file-card:hover { box-shadow: var(--shadow-card-hover); transform: translateY(-4px); }
    #fileContainer.grid .file-card .icon-wrap { width: 100%; height: 160px; border-radius: var(--radius-sm); font-size: 4rem; display: flex; align-items: center; justify-content: center; overflow: hidden; background: var(--surface2); }
    #fileContainer.grid .file-card .icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
    #fileContainer.grid .file-card.folder-card .icon-wrap { background: transparent; color: var(--folder) !important; font-size: 5rem; }
    
    .file-card .name { font-size: 0.95rem; font-weight: 500; color: var(--text); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; word-break: break-word; padding: 0 4px; }
    .file-card .meta { font-size: 0.75rem; color: var(--text-muted); margin-top: auto; padding: 0 4px 4px 4px; }
    
    #fileContainer.list .file-card { flex-direction: row; border: none; border-bottom: 1px solid var(--border); border-radius: 0; padding: 12px 20px; gap: 16px; align-items: center; }
    #fileContainer.list .file-card .icon-wrap { width: 36px; height: 36px; border-radius: var(--radius-sm); font-size: 1.3rem; display: flex; align-items: center; justify-content: center; overflow: hidden; background: var(--surface2); flex-shrink: 0; }
    #fileContainer.list .file-card .icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
    #fileContainer.list .file-card.folder-card .icon-wrap { background: transparent; color: var(--folder) !important; }
    #fileContainer.list .file-card .name { -webkit-line-clamp: 1; line-clamp: 1; flex: 1; padding: 0; }
    #fileContainer.list .file-card .meta { margin-top: 0; width: 150px; text-align: left; padding: 0; }
    
    .download-btn { position: absolute; top: 16px; left: 16px; width: 34px; height: 34px; background: var(--surface); border: 1px solid var(--border); border-radius: 50%; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; text-decoration: none; opacity: 0; transform: scale(0.8); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5; box-shadow: var(--shadow-card); }
    #fileContainer.grid .file-card:hover .download-btn { opacity: 1; transform: scale(1); }
    .download-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    #fileContainer.list .download-btn { position: relative; top: auto; left: auto; opacity: 0; box-shadow: none; border-color: transparent; background: transparent; width: auto; height: auto; padding: 8px; }
    #fileContainer.list .file-card:hover .download-btn { opacity: 1; transform: scale(1); }
    
    .skeleton { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; position: relative; }
    .skeleton::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.04) 50%, transparent 100%); animation: shimmer 1.5s infinite; }
    .skeleton-grid { height: 200px; }
    .skeleton-list { height: 60px; }
    
    .state-box { grid-column: 1 / -1; text-align: center; padding: 100px 20px; color: var(--text-muted); }
    #loadMoreBtn { display: none; margin: 32px auto; padding: 10px 24px; background: var(--surface); border: 1px solid var(--border); color: var(--primary); border-radius: var(--radius); cursor: pointer; font-weight: 500; }
    
    .overlay { position: fixed; inset: 0; background: rgba(32, 33, 36, 0.6); backdrop-filter: blur(4px); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; opacity: 0; transition: opacity 0.3s ease; }
    .overlay.visible { display: flex; opacity: 1; }
    .modal-box { background: var(--surface); border-radius: var(--radius); padding: 48px 40px; max-width: 440px; width: 100%; box-shadow: var(--shadow-modal); text-align: center; position: relative; }
    .modal-icon { font-size: 3.5rem; color: var(--primary); margin-bottom: 24px; }
    .modal-title { font-size: 1.5rem; font-weight: 500; margin-bottom: 16px; }
    .modal-text { font-size: 1rem; color: var(--text-muted); margin-bottom: 32px; line-height: 1.6; }
    
    #previewModal .modal-box { max-width: 90%; height: 90%; padding: 0; display: flex; flex-direction: column; overflow: hidden; background: var(--surface2); }
    .preview-header { padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .preview-title { font-size: 1.1rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .preview-actions { display: flex; gap: 10px; }
    .preview-iframe { flex: 1; width: 100%; border: none; background: #fff; }
    
    .primary-btn { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; }
    .secondary-btn { background: transparent; color: var(--primary); border: 1px solid var(--border); padding: 12px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; margin-top: 12px; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    
    @media (max-width: 900px) { #sidebar { display: none; } .logo { width: auto; } }
    @media (max-width: 600px) { header { padding: 0 16px; gap: 12px; } .logo-text { display: none; } .search-wrap { margin: 0; } main { padding: 16px; } #breadcrumb { padding: 12px 16px; } #fileContainer.grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; } #fileContainer.grid .file-card .icon-wrap { height: 120px; } .toolbar { flex-direction: column; align-items: stretch; gap: 12px; } .toolbar-left { justify-content: space-between; } .modal-box { padding: 32px 24px; } }
  </style>
</head>
<body>

<!-- חלון התחברות -->
<div id="loginOverlay" class="overlay">
  <div class="modal-box">
    <div class="modal-icon"><i class="fa-brands fa-google"></i></div>
    <h1 class="modal-title">התחברות לארכיון</h1>
    <p class="modal-text">כדי לצפות בקבצים פרטיים בארכיון, יש צורך בהתחברות לאישור הרשאות מול גוגל.</p>
    <button id="authBtn" class="primary-btn" style="width:100%;"><i class="fa-solid fa-shield-halved"></i> התחברות באמצעות Google</button>
    <button id="skipAuthBtn" class="secondary-btn" style="width:100%;">המשך ללא התחברות (לקבצים ציבוריים)</button>
  </div>
</div>

<!-- חלון אודות -->
<div id="aboutModal" class="overlay">
  <div class="modal-box">
    <button class="modal-close" id="closeAboutBtn" style="position:absolute; top:15px; right:15px; background:none; border:none; cursor:pointer; font-size:1.2rem; color:var(--text-muted);"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-icon" style="color: var(--folder);"><i class="fa-solid fa-circle-info"></i></div>
    <h1 class="modal-title">אודות המערכת</h1>
    <p class="modal-text">ארכיון מסמכים מתקדם המחובר ישירות ל-Google Drive.<br>המערכת מאפשרת תצוגה מקדימה, חיפוש, וצפייה בתמונות.</p>
    <a href="#" class="primary-btn" id="requestAccessAboutBtn" style="text-decoration:none; width:100%;"><i class="fa-solid fa-envelope"></i> פניה למנהל (בקשת גישה)</a>
  </div>
</div>

<!-- חלון תצוגה מקדימה מוטמע -->
<div id="previewModal" class="overlay">
  <div class="modal-box">
    <div class="preview-header">
      <div class="preview-title" id="previewTitle"><i class="fa-solid fa-file"></i> צפייה בקובץ</div>
      <div class="preview-actions">
        <a href="#" target="_blank" id="previewOpenTab" class="icon-btn" title="פתח בכרטיסייה חדשה" style="border:1px solid var(--border);"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
        <button class="icon-btn" id="closePreviewBtn" title="סגור" style="background:var(--danger-bg); color:var(--danger);"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>
    <iframe id="previewIframe" class="preview-iframe" allow="autoplay"></iframe>
  </div>
</div>

<header>
  <a class="logo" href="#">
    <div class="logo-icon"><i class="fa-solid fa-box-archive"></i></div>
    <span class="logo-text">ארכיון מסמכים</span>
  </a>
  <div class="search-wrap">
    <div class="search-inner">
      <input type="text" id="searchInput" placeholder="חיפוש קבצים ותיקיות..." />
      <span class="search-icon-left"><i class="fa-solid fa-magnifying-glass"></i></span>
      <button class="search-clear" id="searchClear"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="aboutBtn" title="אודות"><i class="fa-solid fa-circle-info"></i></button>
    <button class="icon-btn" id="themeBtn" title="החלף עיצוב"><i class="fa-solid fa-moon"></i></button>
    <button class="icon-btn" id="viewToggleBtn" title="תצוגת רשימה"><i class="fa-solid fa-list-ul"></i></button>
  </div>
</header>

<div id="breadcrumb"></div>

<div class="app-body">
  <aside id="sidebar">
    <div class="sidebar-title">גישה מהירה</div>
    <div id="sidebarTree"></div>
  </aside>
  <main>
    <div class="toolbar">
      <select class="sort-select" id="sortSelect">
        <option value="folder,name">שם (א-ת)</option>
        <option value="modifiedTime desc">תאריך שינוי</option>
      </select>
      <div id="itemCount" class="item-count"></div>
    </div>
    <div class="search-banner" id="searchBanner">
      <span id="searchTerm"></span>
      <button class="search-banner-close" id="searchBannerClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    
    <!-- אזור שגיאות כלליות (יישאר למקרה של שגיאות מערכת) -->
    <div class="error-box" id="errorBox">
      <div style="font-size: 1.5rem;"><i class="fa-solid fa-circle-exclamation"></i></div>
      <div id="errorMsg" style="flex: 1;"></div>
    </div>
    
    <div id="fileContainer" class="grid"></div>
    <button id="loadMoreBtn">הצג עוד קבצים</button>
  </main>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const CONFIG = {
  API_KEY:     'AIzaSyAS1iK*******1Zu-ImsSyH_sf0u*****34',   // <-- החלף במפתח ה-API שלך
  CLIENT_ID:   '10199****931-b5nddn0m0i1*************s7t7q46v.apps.googleusercontent.com', // <-- החלף ב-Client ID שלך
  ROOT_ID:     '1FR9QR*****u612adzeniO-vxFgM3Enl9',   // <-- החלף ב-ID של התיקייה שלך
  PAGE_SIZE:   100,
  ADMIN_EMAIL: 'lifecohen20@gmail.com'
};
// ============================================================

const MIME_FOLDER = 'application/vnd.google-apps.folder';
const FILE_TYPES = {
  'application/vnd.google-apps.folder': { icon: '<i class="fa-solid fa-folder"></i>', color: 'var(--folder)' },
  'application/pdf': { icon: '<i class="fa-solid fa-file-pdf"></i>', color: '#DB4437' },
  'image/jpeg': { icon: '<i class="fa-solid fa-image"></i>', color: '#DB4437' },
  'image/png': { icon: '<i class="fa-solid fa-image"></i>', color: '#DB4437' },
  'video/mp4': { icon: '<i class="fa-solid fa-file-video"></i>', color: '#DB4437' },
  'application/vnd.google-apps.document': { icon: '<i class="fa-solid fa-file-word"></i>', color: '#4285F4' },
  'application/vnd.google-apps.spreadsheet': { icon: '<i class="fa-solid fa-file-excel"></i>', color: '#0F9D58' },
  'application/vnd.google-apps.presentation': { icon: '<i class="fa-solid fa-file-powerpoint"></i>', color: '#F4B400' },
  'text/plain': { icon: '<i class="fa-solid fa-file-lines"></i>', color: '#4285F4' }
};

function getFileType(mimeType) {
  return FILE_TYPES[mimeType] || { icon: '<i class="fa-solid fa-file"></i>', color: 'var(--text-muted)' };
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function debounce(func, wait) {
  let timeout;
  return function(...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  };
}

let state = {
  stack: [{ id: CONFIG.ROOT_ID, name: 'בית' }],
  nextPageToken: null,
  currentQuery: '',
  isSearchMode: false,
  loading: false,
  view: 'grid',
  sort: 'folder,name',
  recentFolders: [],
  accessToken: null,
  skippedAuth: false
};

let tokenClient;

async function apiFetch(url) {
  const headers = {};
  if (state.accessToken) headers['Authorization'] = 'Bearer ' + state.accessToken;
  const res = await fetch(url, { headers });
  if (!res.ok) {
    if ((res.status === 401 || res.status === 403 || res.status === 404)) {
        if (!state.skippedAuth && !state.accessToken) {
            document.getElementById('loginOverlay').classList.add('visible');
            throw new Error('AUTH_REQUIRED');
        } else {
            throw new Error('ACCESS_DENIED');
        }
    }
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'שגיאה: ' + res.status);
  }
  return res.json();
}

const API_FIELDS = 'nextPageToken,files(id,name,mimeType,size,modifiedTime,webViewLink,webContentLink,thumbnailLink,hasThumbnail,iconLink)';

async function loadFolder(folderId, append = false) {
  if (state.loading) return;
  state.loading = true;
  document.getElementById('errorBox').classList.remove('visible');
  
  if (!append) {
      document.getElementById('fileContainer').innerHTML = Array(8).fill('<div class="skeleton skeleton-grid"></div>').join('');
      document.getElementById('loadMoreBtn').style.display = 'none';
  }
  
  try {
    const q = encodeURIComponent(`'${folderId}' in parents and trashed = false`);
    let url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=${encodeURIComponent(API_FIELDS)}&pageSize=${CONFIG.PAGE_SIZE}&orderBy=${encodeURIComponent(state.sort)}&key=${CONFIG.API_KEY}`;
    if (state.nextPageToken && append) url += '&pageToken=' + state.nextPageToken;
    
    const data = await apiFetch(url);
    state.nextPageToken = data.nextPageToken || null;
    renderItems(data.files || [], append);
    document.getElementById('loadMoreBtn').style.display = state.nextPageToken ? 'block' : 'none';
  } catch(e) {
    if (e.message === 'AUTH_REQUIRED') {
        state.loading = false;
        return; 
    }
    
    if (e.message === 'ACCESS_DENIED') {
        renderAccessDenied();
    } else {
        document.getElementById('errorMsg').innerHTML = e.message;
        document.getElementById('errorBox').classList.add('visible');
    }
    
    if (!append && e.message !== 'ACCESS_DENIED') document.getElementById('fileContainer').innerHTML = '';
  } finally { 
    state.loading = false; 
  }
}

// פונקציה להצגת הודעת חוסר גישה בתוך הסייר
function renderAccessDenied() {
    const container = document.getElementById('fileContainer');
    const mailto = `mailto:${CONFIG.ADMIN_EMAIL}?subject=${encodeURIComponent("בקשת הצטרפות לקבוצת הארכיון")}&body=${encodeURIComponent("שלום,\nאשמח לקבל הרשאת גישה לארכיון המסמכים.\nשם משתמש (מייל): \n")}`;
    
    container.innerHTML = `
      <div class="access-denied-container">
        <div class="access-denied-icon"><i class="fa-solid fa-user-lock"></i></div>
        <h2 class="access-denied-title">אין לך הרשאת גישה לארכיון</h2>
        <p class="access-denied-text">
          הקבצים בארכיון זה מוגדרים כפרטיים ומוצגים רק לחברים המורשים בקבוצה שלנו.<br>
          כדי לצפות בתכנים, עליך להתחבר קודם לקבוצת המורשים.
        </p>
        <a href="${mailto}" class="primary-btn">
          <i class="fa-solid fa-envelope"></i> שלח מייל למנהל לבקשת גישה
        </a>
      </div>
    `;
    document.getElementById('itemCount').textContent = '0 פריטים';
    document.getElementById('loadMoreBtn').style.display = 'none';
}

function renderItems(items, append) {
  const container = document.getElementById('fileContainer');
  if (!append) container.innerHTML = '';
  if (items.length === 0 && !append) {
      container.innerHTML = '<div class="state-box">לא נמצאו קבצים</div>';
      return;
  }
  items.forEach((item, i) => {
    const ft = getFileType(item.mimeType);
    const card = document.createElement('div');
    card.className = 'file-card' + (item.mimeType === MIME_FOLDER ? ' folder-card' : '');
    card.style.animationDelay = (i * 0.03) + 's';
    
    let iconHtml = `<div class="icon-wrap" style="color:${ft.color};">${ft.icon}</div>`;
    if (item.hasThumbnail && item.thumbnailLink) {
        const hqThumbnail = item.thumbnailLink.replace('=s220', '=s800');
        iconHtml = `<div class="icon-wrap"><img src="${hqThumbnail}" alt="תמונה ממוזערת" referrerpolicy="no-referrer" loading="lazy" /></div>`;
    }

    card.innerHTML = `
      ${iconHtml}
      <div class="name">${escapeHtml(item.name)}</div>
      ${!item.size ? '' : `<div class="meta">${(item.size/1024).toFixed(1)} KB</div>`}
    `;
    
    card.addEventListener('click', () => {
        if (item.mimeType === MIME_FOLDER) {
            openFolder(item.id, item.name);
        } else {
            openPreview(item.id, item.name, item.webViewLink);
        }
    });
    container.appendChild(card);
  });
  document.getElementById('itemCount').textContent = container.children.length + ' פריטים';
}

function openFolder(id, name) {
  state.stack.push({id, name});
  renderBreadcrumb();
  loadFolder(id);
}

function openPreview(fileId, fileName, fallbackLink) {
    const modal = document.getElementById('previewModal');
    const iframe = document.getElementById('previewIframe');
    const title = document.getElementById('previewTitle');
    const openTabBtn = document.getElementById('previewOpenTab');
    
    title.innerHTML = `<i class="fa-solid fa-file"></i> ${escapeHtml(fileName)}`;
    openTabBtn.href = fallbackLink;
    
    iframe.src = `https://drive.google.com/file/d/${fileId}/preview`;
    modal.classList.add('visible');
}

function closePreview() {
    const modal = document.getElementById('previewModal');
    const iframe = document.getElementById('previewIframe');
    modal.classList.remove('visible');
    setTimeout(() => { iframe.src = ''; }, 300);
}

document.getElementById('closePreviewBtn').addEventListener('click', closePreview);
document.getElementById('previewModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('previewModal')) closePreview();
});

function renderBreadcrumb() {
  const b = document.getElementById('breadcrumb');
  b.innerHTML = '';
  state.stack.forEach((s, i) => {
    const span = document.createElement('span');
    span.className = i === state.stack.length - 1 ? 'crumb-current' : 'crumb';
    span.innerHTML = (i === 0 ? '<i class="fa-solid fa-house"></i>' : '') + ' ' + s.name;
    
    if (i !== state.stack.length - 1) {
        span.addEventListener('click', () => {
            state.stack = state.stack.slice(0, i + 1);
            renderBreadcrumb();
            loadFolder(s.id);
        });
    }
    
    b.appendChild(span);
    
    if (i < state.stack.length - 1) {
        const sep = document.createElement('span');
        sep.className = 'crumb-sep';
        sep.textContent = ' / ';
        b.appendChild(sep);
    }
  });
}

const search = debounce(async (val) => {
    if (!val) { loadFolder(state.stack[state.stack.length-1].id); return; }
    state.loading = true;
    try {
        const q = encodeURIComponent(`name contains '${val.replace(/'/g,"\\'")}' and trashed = false`);
        const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=${encodeURIComponent(API_FIELDS)}&key=${CONFIG.API_KEY}`;
        const data = await apiFetch(url);
        renderItems(data.files || [], false);
    } catch(e) { 
        if (e.message === 'ACCESS_DENIED') renderAccessDenied();
        else {
            document.getElementById('errorMsg').innerHTML = e.message;
            document.getElementById('errorBox').classList.add('visible');
        }
    }
    finally { state.loading = false; }
}, 500);

document.getElementById('searchInput').addEventListener('input', (e) => {
    const val = e.target.value;
    document.getElementById('searchClear').classList.toggle('visible', val.length > 0);
    search(val);
});

document.getElementById('searchClear').addEventListener('click', () => {
    const input = document.getElementById('searchInput');
    input.value = '';
    document.getElementById('searchClear').classList.remove('visible');
    search('');
    input.focus();
});

document.getElementById('searchBannerClose').addEventListener('click', () => {
    document.getElementById('searchBanner').classList.remove('visible');
});

document.getElementById('loadMoreBtn').addEventListener('click', () => {
    if (state.isSearchMode) {
        search(document.getElementById('searchInput').value, true);
    } else {
        loadFolder(state.stack[state.stack.length-1].id, true);
    }
});

document.getElementById('themeBtn').addEventListener('click', () => {
    document.body.classList.toggle('dark-theme');
    const isDark = document.body.classList.contains('dark-theme');
    document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
});

const viewToggleBtn = document.getElementById('viewToggleBtn');
viewToggleBtn.addEventListener('click', () => {
    const fileContainer = document.getElementById('fileContainer');
    if (state.view === 'grid') {
        state.view = 'list'; 
        fileContainer.className = 'list'; 
        viewToggleBtn.innerHTML = '<i class="fa-solid fa-grip"></i>';
        viewToggleBtn.title = 'תצוגת רשת';
    } else {
        state.view = 'grid'; 
        fileContainer.className = 'grid'; 
        viewToggleBtn.innerHTML = '<i class="fa-solid fa-list-ul"></i>';
        viewToggleBtn.title = 'תצוגת רשימה';
    }
});

document.getElementById('aboutBtn').addEventListener('click', () => {
    document.getElementById('aboutModal').classList.add('visible');
});

document.getElementById('closeAboutBtn').addEventListener('click', () => {
    document.getElementById('aboutModal').classList.remove('visible');
});

document.getElementById('skipAuthBtn').addEventListener('click', () => {
    state.skippedAuth = true;
    initApp();
});

document.getElementById('authBtn').addEventListener('click', () => {
    tokenClient.requestAccessToken();
});

document.getElementById('sortSelect').addEventListener('change', (e) => {
    state.sort = e.target.value; 
    if (!state.isSearchMode) loadFolder(state.stack[state.stack.length-1].id); 
});

function initApp() {
    document.getElementById('loginOverlay').classList.remove('visible');
    renderBreadcrumb();
    loadFolder(CONFIG.ROOT_ID);
}

window.onload = () => {
    const mailto = `mailto:${CONFIG.ADMIN_EMAIL}?subject=${encodeURIComponent("בקשת גישה לארכיון")}`;
    document.getElementById('requestAccessAboutBtn').href = mailto;

    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback: (res) => {
            if (res.access_token) {
                state.accessToken = res.access_token;
                state.skippedAuth = false;
                initApp();
            }
        }
    });
    
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
        document.getElementById('themeBtn').innerHTML = '<i class="fa-solid fa-sun"></i>';
    }

    if (!state.accessToken) {
        document.getElementById('loginOverlay').classList.add('visible');
    }
};
</script>
