name: Sync Google Drive to JSON

on:
  schedule:
    # מריץ את הסקריפט כל 3 שעות
    - cron: '0 */3 * * *'
  workflow_dispatch: # מאפשר הרצה ידנית בלחיצת כפתור

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Sync Script
      env:
        GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        FOLDER_ID: ${{ secrets.FOLDER_ID }}
      run: python sync.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add database.json
        # יבצע שמירה רק אם היו שינויים בקבצים
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update database.json" && git push)
